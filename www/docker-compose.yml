version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sk_juridico_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sk_user
      POSTGRES_PASSWORD: sk_pass
      POSTGRES_DB: sk_juridico
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sk_user -d sk_juridico"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sk_juridico_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sk_user:sk_pass@postgres:5432/sk_juridico
      PORT: 8080
      NODE_ENV: production
    ports:
      - "8080:8080"
    volumes:
      - ./local.config.json:/app/local.config.json

  frontend:
    image: nginx:alpine
    container_name: sk_juridico_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./artifacts/assistente-juridico/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
